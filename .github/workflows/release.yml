name: Build & release rootfs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      alpine_version:
        description: "Alpine version (e.g. 3.23.0). Must be a real x.y.z release."
        required: false
        default: "3.23.0"
  schedule:
    # Weekly rebuild to pick up Alpine point releases / security fixes.
    - cron: "17 6 * * 1"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: aarch64
      ALPINE_VERSION: ${{ github.event.inputs.alpine_version || '3.23.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build rootfs
        run: ./build/build.sh

      - name: Compute release tag
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d-%H%M)
          TAG="v${ALPINE_VERSION}-${DATE}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Alpine ${ALPINE_VERSION} (${ARCH}) — ${DATE} UTC" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          make_latest: "true"
          generate_release_notes: true
          files: |
            dist/alpine-aarch64-rootfs.tar.gz
            dist/alpine-aarch64-rootfs.tar.gz.sha256
